name: Build Production

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
            DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
            DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
            PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: Build application
              run: npm run build

            - name: Prepare standalone artifact
              run: |
                  cp -r public .next/standalone/public
                  mkdir -p .next/standalone/.next
                  cp -r .next/static .next/standalone/.next/static

            - name: Create deployment archive
              run: |
                  cd .next/standalone
                  tar -czf ../../deploy.tar.gz .

            - name: Upload deployment artifact
              uses: actions/upload-artifact@v6
              with:
                  name: production-build
                  path: deploy.tar.gz
                  retention-days: 3

            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

            - name: Upload deployment archive
              run: |
                  scp \
                      -i ~/.ssh/deploy_key \
                      -o IdentitiesOnly=yes \
                      -P "$DEPLOY_PORT" \
                      deploy.tar.gz \
                      "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy.tar.gz"

            - name: Extract deployment archive
              run: |
                  ssh \
                      -i ~/.ssh/deploy_key \
                      -o IdentitiesOnly=yes \
                      -p "$DEPLOY_PORT" \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      "PROJECT_PATH='$PROJECT_PATH' bash -s" <<'EOF'
                  set -e

                  mkdir -p "$PROJECT_PATH"

                  find "$PROJECT_PATH" \
                      -mindepth 1 \
                      -maxdepth 1 \
                      ! -name '.env' \
                      -exec rm -rf {} +

                  tar -xzf /tmp/deploy.tar.gz -C "$PROJECT_PATH"
                  rm -f /tmp/deploy.tar.gz

                  ls -la "$PROJECT_PATH"
                  EOF

            - name: Restart application with PM2
              run: |
                  ssh \
                      -i ~/.ssh/deploy_key \
                      -o IdentitiesOnly=yes \
                      -p "$DEPLOY_PORT" \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      "PROJECT_PATH='$PROJECT_PATH' bash -s" <<'EOF'
                  set -e

                  pm2 delete ekunitsa-resume || true

                  pm2 start server.js \
                      --name ekunitsa-resume \
                      --cwd "$PROJECT_PATH"

                  pm2 save
                  EOF
